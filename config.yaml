# ============================================================
# TS-GraphRAG Configuration
# Topology-Stratified Graph RAG for Leak Localization
# ============================================================

# --- Network ---
network:
  inp_file: "data/Exa7.inp"
  name: "EXA7"
  junctions: 383
  pipes: 453
  reservoirs: 3
  pumps: 7

# --- Phase 1: Partitioning ---
partitioning:
  algorithm: "leiden"                 # Leiden community detection
  num_partitions: 15                 # K = 15 (optimal for EXA7)
  resolution_range: [0.001, 3.0]     # Search range for Leiden resolution
  num_iterations: 300                # Number of resolution samples
  save_range: [2, 40]                # Only save K in this range

# --- Phase 1: Sensor Placement ---
sensor_placement:
  sensors_per_partition: 2           # m_k = 2
  total_sensors: 30                  # 15 × 2 = 30
  sensitivity_threshold: 0.5
  target_coverage: 0.95
  demand_perturbation_ratio: 0.20

# --- Phase 2: Knowledge Base ---
knowledge_base:
  output_dir: "knowledge_base"
  nodes_per_partition: 2             # Representative leak nodes
  leak_rates_Ls: [2, 5, 10, 20, 35, 50]  # L/s
  demand_periods:
    - name: "night_low"
      multiplier: 0.6
    - name: "day_normal"
      multiplier: 1.0
    - name: "evening_peak"
      multiplier: 1.4
  total_scenarios: 540               # 15 × 2 × 6 × 3

# --- Phase 2: Scenario Knowledge Graph ---
knowledge_graph:
  similarity_threshold: 0.85         # θ for similarity edges (Eq. 11)
  edge_types:
    - "topological"                  # Between-partition (Eq. 10)
    - "similarity"                   # Within-partition (Eq. 11)
  hierarchical_levels: 3             # Global → Community → Scenario

# --- Phase 2: Embeddings ---
embedding:
  model: "all-MiniLM-L6-v2"         # Sentence-BERT
  dimension: 384
  vector_store: "lancedb"
  table_name: "leak_scenarios"

# --- Phase 3: Inference ---
inference:
  top_k: 10
  channel_weights:
    # Adaptive weight schedule w_c(δ) — Table 1 in paper
    micro:      # δ < 0.1 m
      sensor_prior: 0.10
      centroid_match: 0.20
      rank_correlation: 0.30
      fingerprint_retrieval: 0.20
      semantic_retrieval: 0.10
      community_retrieval: 0.10
    moderate:   # 0.1 ≤ δ < 1.0 m
      sensor_prior: 0.20
      centroid_match: 0.25
      rank_correlation: 0.25
      fingerprint_retrieval: 0.15
      semantic_retrieval: 0.10
      community_retrieval: 0.05
    large:      # δ ≥ 1.0 m
      sensor_prior: 0.30
      centroid_match: 0.30
      rank_correlation: 0.15
      fingerprint_retrieval: 0.10
      semantic_retrieval: 0.10
      community_retrieval: 0.05

  topological_propagation:
    beta: 0.15                       # Propagation strength (Eq. 19)
    steps: 1                         # Single message-passing step

# --- Phase 3: LLM Arbitration ---
llm_arbitration:
  enabled: false                     # Set true to enable
  model: "gpt-oss:120b-cloud"       # LLM endpoint
  temperature: 0.1
  confidence_thresholds:
    high: 0.15                       # τ_H (Eq. 20)
    low: 0.05                        # τ_L
  consistency_checks:
    spatial_adjacency: true          # Eq. 21
    fingerprint_cosine_min: 0.3      # θ_min (Eq. 22)

# --- Evaluation ---
evaluation:
  noise_sigma: 0.02                  # Gaussian noise σ (meters)
  metrics:
    - "top1_accuracy"
    - "top3_accuracy"
    - "mrr"
    - "macro_precision"
    - "macro_recall"
    - "macro_f1"
